<script>
var LOCK_KEY = "pf_lock_pw";
var DEFAULT_PW = "1234";
var bioCredId = localStorage.getItem("pf_bio_cred") || null;

function getSavedPw() { return localStorage.getItem(LOCK_KEY) || DEFAULT_PW; }

var _appMounted = false;
function unlock() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("root").style.display = "block";
  // ★ React 앱 최초 1회만 마운트 (빈 화면 버그 방지)
  if (!_appMounted) {
    _appMounted = true;
    setTimeout(function() {
      if (window.__mountApp) window.__mountApp();
    }, 10);
  }
}

function setMsg(msg, isErr) {
  var el = document.getElementById("lockMsg");
  el.textContent = msg;
  el.style.color = isErr ? "#dc2626" : "#059669";
}

function clearMsg() {
  var el = document.getElementById("lockMsg");
  el.textContent = "비밀번호 입력 또는 지문 인증";
  el.style.color = "#6b7280";
}

function tryPassword() {
  var v = document.getElementById("pwInput").value;
  if (!v) { setMsg("비밀번호를 입력해주세요.", true); return; }
  if (v === getSavedPw()) {
    setMsg("인증 성공!", false);
    setTimeout(unlock, 350);
  } else {
    setMsg("비밀번호가 틀렸어요.", true);
    document.getElementById("pwInput").value = "";
    var inp = document.getElementById("pwInput");
    inp.style.borderColor = "#e03131";
    inp.style.animation = "shake .35s ease";
    setTimeout(function() {
      inp.style.borderColor = "#1e3250";
      inp.style.animation = "";
      inp.focus();
    }, 400);
  }
}

function togglePw() {
  var i = document.getElementById("pwInput");
  i.type = (i.type === "password") ? "text" : "password";
}

function tryBiometric() {
  document.getElementById("bioBtn").textContent = "⏳";
  if (bioCredId) { authBio(); } else { enrollBio(); }
}

function enrollBio() {
  if (!window.PublicKeyCredential) {
    setMsg("지문 미지원 기기입니다.", true);
    resetBioBtn();
    return;
  }
  setMsg("지문을 올려주세요...", false);
  var ch = new Uint8Array(32);
  crypto.getRandomValues(ch);
  navigator.credentials.create({
    publicKey: {
      challenge: ch,
      rp: { name: "내포트폴리오", id: location.hostname || "localhost" },
      user: { id: new Uint8Array([1]), name: "user", displayName: "사용자" },
      pubKeyCredParams: [
        { type: "public-key", alg: -7 },
        { type: "public-key", alg: -257 }
      ],
      authenticatorSelection: {
        authenticatorAttachment: "platform",
        userVerification: "required",
        requireResidentKey: false
      },
      timeout: 30000
    }
  }).then(function(cred) {
    var rawBytes = new Uint8Array(cred.rawId);
    var binary = "";
    for (var i = 0; i < rawBytes.length; i++) binary += String.fromCharCode(rawBytes[i]);
    var id = btoa(binary);
    localStorage.setItem("pf_bio_cred", id);
    bioCredId = id;
    document.getElementById("bioLabel").textContent = "지문 인식 (등록됨)";
    document.getElementById("bioBtn").style.borderColor = "#34d399";
    setMsg("지문 등록 완료!", false);
    setTimeout(unlock, 500);
  }).catch(function(e) {
    setMsg(e.name === "NotAllowedError" ? "지문 인식이 취소됐어요." : "지문 등록 실패. 기기 설정을 확인하세요.", true);
    resetBioBtn();
  });
}

function authBio() {
  if (!window.PublicKeyCredential) {
    setMsg("지문 미지원 기기입니다.", true);
    resetBioBtn();
    return;
  }
  setMsg("지문을 인식합니다...", false);
  var ch = new Uint8Array(32);
  crypto.getRandomValues(ch);
  var bin = atob(bioCredId);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  navigator.credentials.get({
    publicKey: {
      challenge: ch,
      allowCredentials: [{ type: "public-key", id: arr.buffer }],
      userVerification: "required",
      timeout: 30000
    }
  }).then(function() {
    setMsg("지문 인증 성공!", false);
    setTimeout(unlock, 350);
  }).catch(function(e) {
    if (e.name === "InvalidStateError") {
      localStorage.removeItem("pf_bio_cred");
      bioCredId = null;
      setMsg("지문 정보가 초기화됐어요. 다시 등록해주세요.", true);
    } else {
      setMsg(e.name === "NotAllowedError" ? "지문 인식이 취소됐어요." : "지문 인식 실패. 비밀번호를 사용해주세요.", true);
    }
    resetBioBtn();
  });
}

function resetBioBtn() { document.getElementById("bioBtn").textContent = "👆"; }

function showChangePw() {
  document.getElementById("changePwPanel").style.display = "block";
  setTimeout(function() { document.getElementById("oldPw").focus(); }, 100);
}

function cancelChangePw() {
  document.getElementById("changePwPanel").style.display = "none";
  var ids = ["oldPw", "newPw1", "newPw2"];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = "";
  clearMsg();
}

function doChangePw() {
  var old = document.getElementById("oldPw").value;
  var p1  = document.getElementById("newPw1").value;
  var p2  = document.getElementById("newPw2").value;
  if (!old) { setMsg("현재 비밀번호를 입력해주세요.", true); document.getElementById("oldPw").focus(); return; }
  if (old !== getSavedPw()) { setMsg("현재 비밀번호가 틀렸어요.", true); document.getElementById("oldPw").value = ""; document.getElementById("oldPw").focus(); return; }
  if (!p1 || p1.length < 4) { setMsg("새 비밀번호는 4자 이상이어야 해요.", true); document.getElementById("newPw1").focus(); return; }
  if (p1 !== p2) { setMsg("새 비밀번호가 일치하지 않아요.", true); document.getElementById("newPw2").value = ""; document.getElementById("newPw2").focus(); return; }
  if (p1 === old) { setMsg("현재 비밀번호와 같아요. 다른 비밀번호를 입력해주세요.", true); return; }
  localStorage.setItem(LOCK_KEY, p1);
  cancelChangePw();
  setMsg("비밀번호가 변경됐어요!", false);
}

// 초기화 (지문 지원 여부 확인)
function portfolioInit() {
  if (!localStorage.getItem(LOCK_KEY)) setMsg("초기 비밀번호: 1234 (변경을 권장해요)", false);
  if (!window.PublicKeyCredential) {
    document.getElementById("bioBtn").style.opacity = "0.35";
    document.getElementById("bioLabel").textContent = "지문 미지원";
    return;
  }
  PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable()
    .then(function(ok) {
      if (!ok) {
        document.getElementById("bioBtn").style.opacity = "0.35";
        document.getElementById("bioLabel").textContent = "지문 센서 없음";
      } else if (bioCredId) {
        document.getElementById("bioLabel").textContent = "지문 인식 (등록됨)";
        document.getElementById("bioBtn").style.borderColor = "#34d399";
        document.getElementById("bioBtn").style.boxShadow = "0 4px 24px #34d39933";
      }
    })
    .catch(function() {
      document.getElementById("bioBtn").style.opacity = "0.35";
      document.getElementById("bioLabel").textContent = "지문 미지원";
    });
}
portfolioInit();
// ★★★ [버그수정] iframe 모드: setInterval 100ms 폴링 + rAF 병행으로 Babel 파싱 완료 확실히 감지
// requestAnimationFrame 단독으로는 Babel 비동기 파싱 완료 전에 체크가 끝나 빈화면 발생
if(window.self!==window.top){
  var _iframeUnlockDone=false;
  var _iframeUnlockInterval=null;
  function _doIframeUnlock(){
    if(_iframeUnlockDone)return;
    _iframeUnlockDone=true;
    clearInterval(_iframeUnlockInterval);
    unlock();
  }
  // 100ms 간격 폴링 — Babel 파싱 완료를 놓치지 않음
  _iframeUnlockInterval=setInterval(function(){
    if(typeof window.__mountApp==="function")_doIframeUnlock();
  },100);
  // rAF도 병행 (빠른 환경 대응)
  function _scheduleUnlock(){
    if(_iframeUnlockDone)return;
    if(typeof window.__mountApp==="function"){_doIframeUnlock();return;}
    requestAnimationFrame(_scheduleUnlock);
  }
  if(document.readyState==="loading"){
    document.addEventListener("DOMContentLoaded",function(){requestAnimationFrame(_scheduleUnlock);});
  }else{
    requestAnimationFrame(_scheduleUnlock);
  }
  // 안전망: 15초 내 미실행 시 강제 실행
  setTimeout(function(){
    if(!_iframeUnlockDone){_iframeUnlockDone=true;clearInterval(_iframeUnlockInterval);unlock();}
  },15000);
}

// 캐시 복원
function getPricesCache() {
  try { return JSON.parse(localStorage.getItem("pf_prices_cache") || "{}"); }
  catch(e) { return {}; }
}
function getFxCache() {
  try { return JSON.parse(localStorage.getItem("pf_fx_cache") || "null"); }
  catch(e) { return null; }
}
window.__cache = { prices: getPricesCache(), fxCache: getFxCache() };
</script>

function parseSyncMs(value){ const ms = Date.parse(value || ""); return Number.isFinite(ms) ? ms : 0; }
function normalizeSyncIso(value, fallback){
  const ms = parseSyncMs(value) || parseSyncMs(fallback) || Date.now();
  return new Date(ms).toISOString();
}
async function backup() {
  if (!_uid) return;
  if (window._freezeBackup) { badge("백업 대기 중 ⏸"); return; }
  try {
    const backedAt = new Date().toISOString();
    const contentUpdatedAt = normalizeSyncIso(localStorage.getItem(SYNC_KEYS.stock) || localStorage.getItem(SYNC_KEYS.global), backedAt);
    const data = { updatedAt: contentUpdatedAt, backedAt };
    KEYS.forEach(k => { const v = localStorage.getItem(k); if(v) data[k] = v; });
    await set(ref(db, "users/" + _uid + "/apps/stock"), data);
    await set(ref(db, "users/" + _uid + "/sync"), { updatedAt: contentUpdatedAt, backedAt, source: 'stock' });
    badge("백업 완료 ✅");
  } catch(e) {
    console.warn("[Stock] 백업 실패:", e);
  }
}

// ★ [BUG FIX] index.html의 FREEZE/UNFREEZE 신호 수신 및 REQUEST_BACKUP 처리
window._freezeBackup = false;
const _orig = localStorage.setItem.bind(localStorage);
function setStoredSyncTime(key, iso){
  const normalized = normalizeSyncIso(iso);
  _orig(key, normalized);
  return normalized;
}
function markLocalStockChanged(iso){
  const normalized = setStoredSyncTime(SYNC_KEYS.stock, iso || new Date().toISOString());
  const globalMs = parseSyncMs(localStorage.getItem(SYNC_KEYS.global));
  const curMs = parseSyncMs(normalized);
  if (curMs >= globalMs) _orig(SYNC_KEYS.global, normalized);
  return normalized;
}
(function bootstrapStockSyncTime(){
  if (!localStorage.getItem(SYNC_KEYS.stock) && localStorage.getItem('pf_v4')) {
    const legacy = localStorage.getItem(SYNC_KEYS.global);
    if (legacy) _orig(SYNC_KEYS.stock, normalizeSyncIso(legacy));
  }
})();
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'FREEZE_BACKUP') {
    window._freezeBackup = true;
    clearTimeout(_timer); // 예약된 자동백업도 취소
    return;
  }
  if (e.data.type === 'UNFREEZE_BACKUP') {
    window._freezeBackup = false;
    return;
  }
  if (e.data.type === 'REQUEST_BACKUP') {
    const data = { updatedAt: normalizeSyncIso(localStorage.getItem(SYNC_KEYS.stock) || localStorage.getItem(SYNC_KEYS.global), new Date().toISOString()) };
    KEYS.forEach(k => { const v = localStorage.getItem(k); if(v) data[k] = v; });
    try { window.parent.postMessage({ type: 'BACKUP_DATA', data: data }, '*'); } catch(err) {}
    return;
  }
  if (e.data.type === 'RELOAD_DATA') {
    if (!e.data.data) return;
    _restoring = true;
    const d = e.data.data;
    KEYS.forEach(k => { if(d[k]) _orig(k, d[k]); });
    if (d.updatedAt) {
      setStoredSyncTime(SYNC_KEYS.stock, d.updatedAt);
      const incomingMs = parseSyncMs(d.updatedAt);
      const globalMs = parseSyncMs(localStorage.getItem(SYNC_KEYS.global));
      if (incomingMs >= globalMs) _orig(SYNC_KEYS.global, normalizeSyncIso(d.updatedAt));
    }
    _restoring = false;
    badge("🔄 동기화 완료, 새로고침...");
    setTimeout(() => location.reload(), 1200);
    return;
  }
});
// ★ 복원 중 플래그: index.html이 RELOAD_DATA로 복원할 때 자동백업 차단
let _restoring = false;
localStorage.setItem = function(k, v) {
  const prev = localStorage.getItem(k);
  _orig(k, v);
  if (KEYS.includes(k) && !_restoring && prev !== String(v)) {
    markLocalStockChanged();
    if (_uid) {
      clearTimeout(_timer);
      _timer = setTimeout(backup, 2000);
    }
  }
};

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    badge("Google 로그인 중...");
    autoGoogleLogin();
    return;
  }
  _uid = user.uid;
  const name = user.displayName ? user.displayName.split(' ')[0] : user.email;
  badge(name + " ✅");
  // ★ stock.html은 자체 Firebase sync 하지 않음
  // index.html이 타임스탬프 비교 후 RELOAD_DATA로 데이터 전달
  // stock.html은 로컬 데이터가 없을 때만 Firebase에서 복원
  try {
    const snap = await get(ref(db, "users/" + _uid + "/apps/stock"));
    const local = localStorage.getItem("pf_v4");
    // ★ BUG FIX: isEmpty 판단을 더 정확하게 — pf_v4가 없거나 holdings가 빈 객체인 경우
    let isEmpty = !local;
    if (!isEmpty) {
      try {
        const parsed = JSON.parse(local);
        isEmpty = !parsed || !parsed.holdings || Object.keys(parsed.holdings).length === 0;
      } catch(e) { isEmpty = true; }
    }
    if (snap.exists() && snap.val()["pf_v4"] && isEmpty) {
      _restoring = true;
      const data = snap.val();
      KEYS.forEach(k => { if(data[k]) _orig(k, data[k]); });
      if(data.updatedAt){
        try{
          setStoredSyncTime(SYNC_KEYS.stock, data.updatedAt);
          const incomingMs = parseSyncMs(data.updatedAt);
          const globalMs = parseSyncMs(localStorage.getItem(SYNC_KEYS.global));
          if(incomingMs >= globalMs) _orig(SYNC_KEYS.global, normalizeSyncIso(data.updatedAt));
        }catch(e){}
      }
      _restoring = false;
      badge("데이터 복원됨 🔄");
      setTimeout(() => location.reload(), 1200);
    } else {
      // 로컬에 데이터 있음 → index.html이 동기화 담당
      // ★ stock.html은 시작 시 backup() 하지 않음
      // 사용자가 데이터 수정할 때만 localStorage.setItem 훅으로 backup() 실행
      // (시작 시 backup()하면 Firebase 타임스탬프를 갱신해서 동기화 비교 오작동)
    }
  } catch(e) {
    badge("동기화 오류", 'err');
    console.warn("[Stock] 오류:", e);
  }
});

<script>
if(typeof Promise.any !== "function"){
  Promise.any = function(promises){
    return new Promise(function(resolve, reject){
      var errors = [];
      var remaining = promises.length;
      if(remaining === 0){ reject(new AggregateError([], "All promises were rejected")); return; }
      promises.forEach(function(p, i){
        Promise.resolve(p).then(resolve).catch(function(e){
          errors[i] = e;
          remaining--;
          if(remaining === 0) reject(new AggregateError(errors, "All promises were rejected"));
        });
      });
    });
  };
}
if(typeof AggregateError !== "function"){
  window.AggregateError = function(errors, message){ this.errors = errors; this.message = message; };
  window.AggregateError.prototype = Object.create(Error.prototype);
}
</script>

const won=n=>{const v=parseFloat(n);if(!isFinite(v)||isNaN(v))return"₩0";const abs=Math.abs(Math.round(v));return(v<0?"-":"")+"₩"+abs.toLocaleString("ko-KR");};
const pf=n=>{const v=parseFloat(n);if(!isFinite(v)||isNaN(v))return"0.00%";return`${v>0?"+":v<0?"-":""}${Math.abs(v).toFixed(2)}%`;};
const usd=n=>{const v=parseFloat(n);return(!isFinite(v)||isNaN(v))?"$0":`$${v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;};
const nf=n=>(n==null||n===""||isNaN(Number(n)))?"—":Number(n).toLocaleString("ko-KR");
const ld=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch(e){return d;}};
const sv=(k,v)=>{
  if(typeof _restoring !== 'undefined' && _restoring && ["pf_v4","pf_history_v1","pf_acct_order","pf_item_order"].includes(k)){return;}
  try{
    const raw=JSON.stringify(v);
    if(localStorage.getItem(k)===raw)return;
    localStorage.setItem(k,raw);
  }catch(e){}
};
const parseDate=s=>{if(!s)return null;const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const calcSavings=h=>{
  const p=parseFloat(h.principal)||0,r=parseFloat(h.rate)||0,s=parseDate(h.startDate);
  if(!p||!r||!s)return null;
  const days=Math.max(0,Math.floor((new Date()-s)/86400000));
  const cur=p*(1+(r/100)*(days/365));
  return{principal:p,current:cur,pnl:cur-p,pct:(cur-p)/p*100,days};
};
const calcFund=h=>{
  const nav=parseFloat(h.nav)||0,qty=parseFloat(h.qty)||0,avgNav=parseFloat(h.avgNav)||0;
  if(!nav||!qty)return null;
  const cur=nav*qty,inv=avgNav>0?avgNav*qty:cur;
  return{current:cur,invested:inv,pnl:cur-inv,pct:inv>0?(cur-inv)/inv*100:0};
};

// ★ CMA 이자 자동계산
// - 현재 평가금액: 기산일부터 누적된 전체 이자를 반영
// - 누적 이자(pnl/yearInterest): 매년 1월 1일 ~ 12월 31일 기준 연간 누적 이자만 표시
// - 원금 수정 시에는 adjustments 히스토리를 사용해 입금 원금이 이자에 포함되지 않도록 처리
const calcCMA=h=>{
  // ★★ 새 방식: principal = 사용자가 입력한 현재 잔액 (원금+이자 합산)
  // current = principal 그대로, 이자는 startDate(=마지막 수정일)부터 오늘까지 계산
  // savedYearInterest = 이전 수정 시점까지 쌓인 올해 누적이자 (보존값)
  const balance=parseFloat(h.principal)||0;
  const rate=parseFloat(h.rate)||0;
  const start=parseDate(h.startDate);
  if(!rate||!start)return null;
  // 원금(잔액) 0이어도 누적이자 보존
  if(!balance){
    const savedYear=parseFloat(h.savedYearInterest)||parseFloat(h.yearInterest)||parseFloat(h.pnl)||0;
    const savedTotal=parseFloat(h.savedTotalInterest)||parseFloat(h.totalInterest)||0;
    return{principal:0,invested:0,current:0,pnl:savedYear,yearInterest:savedYear,
      totalInterest:savedTotal,pct:0,totalPct:0,days:0,dailyInterest:0};
  }

  const today=new Date();
  today.setHours(0,0,0,0);
  const startDay=new Date(start);
  startDay.setHours(0,0,0,0);

  const daysBetween=(from,to)=>Math.max(0,Math.floor((to-from)/86400000));
  const yearStart=new Date(today.getFullYear(),0,1);

  // 일이자: 현재 잔액 기준
  const dailyInterest=balance*(rate/100)/365;
  // startDate부터 오늘까지 경과일
  const days=daysBetween(startDay,today);

  // 오늘까지 새로 쌓인 이자 (startDate ~ today)
  let newTotalInterest=0;
  let newYearInterest=0;
  if(days>0&&balance>0){
    newTotalInterest=balance*(rate/100)*(days/365);
    const yFrom=startDay<yearStart?yearStart:startDay;
    if(today>yFrom){
      const yDays=daysBetween(yFrom,today);
      if(yDays>0)newYearInterest=balance*(rate/100)*(yDays/365);
    }
  }

  // 이전 수정 시점까지 보존된 올해 누적이자
  const savedYear=parseFloat(h.savedYearInterest)||0;
  const savedTotal=parseFloat(h.savedTotalInterest)||0;

  const yearInterest=savedYear+newYearInterest;
  const totalInterest=savedTotal+newTotalInterest;

  // current = 입력한 잔액 그대로 (이미 이자 포함된 금액)
  const current=balance;

  return {
    principal:balance,
    invested:balance,
    current,
    pnl:yearInterest,
    yearInterest,
    totalInterest,
    pct:balance>0?(yearInterest/balance)*100:0,
    totalPct:balance>0?(totalInterest/balance)*100:0,
    days,
    dailyInterest
  };
};

/* DonutChart */
function DonutChart({holdings,calcH,prices,fxRate}){
  const pd=useMemo(()=>{
    const m={};
    Object.entries(holdings).forEach(([aid,list])=>{
      const ac=ACCOUNTS.find(a=>a.id===aid),r=ac?.shared ? 0.5 : 1;
      (list||[]).forEach(h=>{const c=calcH(h,aid,prices,fxRate);if(c.current>0)m[h.assetType]=(m[h.assetType]||0)+c.current*r;});
    });
    return Object.entries(m).filter(([,v])=>v>0).map(([k,v])=>({label:k,color:TYPE_COLORS[k]||"#888",v})).sort((a,b)=>b.v-a.v);
  },[holdings,calcH,prices,fxRate]);
  const total=pd.reduce((s,d)=>s+d.v,0);
  if(!total)return(<div style={{background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,textAlign:"center",color:C.muted,marginTop:14}}><div style={{fontSize:36,marginBottom:8}}>📊</div><div style={{fontSize:14,color:C.sub}}>계좌별 탭에서 종목을 추가하면<br/>자산 배분 차트가 나타나요</div></div>);
  const sz=154,cx=sz/2,cy=sz/2,R=sz*.41,r=sz*.265;let a=-Math.PI/2;
  const sl=pd.map(d=>{const da=(d.v/total)*2*Math.PI,ea=a+da,lg=da>Math.PI?1:0;const p=`M${cx+R*Math.cos(a)},${cy+R*Math.sin(a)}A${R},${R},0,${lg},1,${cx+R*Math.cos(ea)},${cy+R*Math.sin(ea)}L${cx+r*Math.cos(ea)},${cy+r*Math.sin(ea)}A${r},${r},0,${lg},0,${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}Z`;const s={p,color:d.color};a=ea;return s;});
  return(<div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginTop:14}}>
    <ST t="자산유형 배분 (내 지분 기준)"/>
    <div style={{display:"flex",alignItems:"center",gap:16}}>
      <svg width={sz} height={sz} style={{flexShrink:0}}>
        {sl.map((s,i)=><path key={i} d={s.p} fill={s.color} stroke="#ffffff" strokeWidth={2}/>)}
        <text x={cx} y={cy-8} textAnchor="middle" fill={C.muted} fontSize={11} fontFamily="Noto Sans KR,sans-serif">총자산</text>
        <text x={cx} y={cy+10} textAnchor="middle" fill={C.text} fontSize={12} fontWeight="700" fontFamily="Noto Sans KR,sans-serif">{(total/10000).toFixed(0)}만원</text>
      </svg>
      <div style={{flex:1}}>
        {pd.map((d,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:9,height:9,borderRadius:2,background:d.color,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.label}</div><div style={{fontSize:11,color:C.muted}}>{won(d.v)}</div></div>
          <div style={{fontSize:13,fontWeight:700,color:d.color,flexShrink:0}}>{((d.v/total)*100).toFixed(1)}%</div>
        </div>))}
      </div>
    </div>
  </div>);
}

/* ════════════════════════════════════════════
   수익률 히스토리 그래프
════════════════════════════════════════════ */
function LineChart({data,color,height=140}){
  if(!data||data.length<1)return null;
  // 데이터 1개면 가상 포인트 추가해서 선 표시
  if(data.length===1)data=[{...data[0],label:"시작"},{...data[0],label:data[0].label||"오늘"}];
  const W=340,H=height,pt=10,pb=26,pl=44,pr=10;
  const iw=W-pl-pr,ih=H-pt-pb;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||0.01;
  const gx=(_,i)=>pl+i/(data.length-1)*iw;
  const gy=v=>pt+ih-(v-mn)/range*ih;
  const pts=data.map((d,i)=>`${gx(0,i)},${gy(d.v)}`).join(" ");
  const area=`M${gx(0,0)},${H-pb} `+data.map((d,i)=>`L${gx(0,i)},${gy(d.v)}`).join(" ")+` L${gx(0,data.length-1)},${H-pb} Z`;
  const yTicks=[mn,mn+range/2,mx];
  const step=Math.max(1,Math.floor((data.length-1)/4));
  const lblIdx=[...new Set([0,...[1,2,3,4].map(k=>Math.min(Math.round(k*step),data.length-1))])];
  const zeroY=mn<0&&mx>0?gy(0):null;
  const gradId=`g${color.replace(/[^a-z0-9]/gi,"")}`;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
      <defs><linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
        <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
      </linearGradient></defs>
      {yTicks.map((v,i)=><line key={i} x1={pl} y1={gy(v)} x2={W-pr} y2={gy(v)} stroke="#e5e7eb" strokeWidth={1}/>)}
      {zeroY&&<line x1={pl} y1={zeroY} x2={W-pr} y2={zeroY} stroke="#9ca3af" strokeWidth={1.5} strokeDasharray="4,3"/>}
      <path d={area} fill={`url(#${gradId})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={gx(0,data.length-1)} cy={gy(data[data.length-1].v)} r={4} fill={color} stroke="#ffffff" strokeWidth={2}/>
      {yTicks.map((v,i)=>(
        <text key={i} x={pl-4} y={gy(v)+4} textAnchor="end" fill="#6b7280" fontSize={9} fontFamily="Noto Sans KR,sans-serif">
          {v>=0?"+":""}{v.toFixed(1)}%
        </text>
      ))}
      {lblIdx.filter(i=>i<data.length).map(i=>(
        <text key={i} x={gx(0,i)} y={H-4} textAnchor="middle" fill="#6b7280" fontSize={9} fontFamily="Noto Sans KR,sans-serif">
          {data[i].label}
        </text>
      ))}
    </svg>
  );
}

function GraphView({allAccounts,myTotal,myPnl,myPct,history}){
  const[period,setPeriod]=useState("week");
  const[target,setTarget]=useState("total");
  const PERIODS=[["day","1일"],["week","주간"],["month","월간"],["year","전체"]];

  // 2025-10-01부터 오늘까지 날짜 목록
  const allDates=useMemo(()=>{
    const list=[],start=new Date(GRAPH_START),today=new Date();
    today.setHours(0,0,0,0);
    const cur=new Date(start);
    while(cur<=today){list.push(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
    return list;
  },[]);

  const dateList=useMemo(()=>{
    const n=period==="day"?2:period==="week"?7:period==="month"?30:allDates.length;
    return allDates.slice(-n);
  },[period,allDates]);

  // forward fill: 데이터 없는 날은 직전값 사용
  const chartData=useMemo(()=>{
    if(!dateList.length)return[];
    let lastSnap=null;
    const startIdx=allDates.indexOf(dateList[0]);
    for(let i=0;i<startIdx;i++){const s=history[allDates[i]];if(s?.[target])lastSnap=s[target];}
    return dateList.map((date,i)=>{
      const snap=history[date]?.[target];
      if(snap)lastSnap=snap;
      if(!lastSnap?.invested)return null;
      const pct=(lastSnap.current-lastSnap.invested)/lastSnap.invested*100;
      let label="";
      const mo=date.slice(5,7),dy=date.slice(8,10);
      if(period==="day")label=i===0?"어제":"오늘";
      else if(period==="week")label=`${mo}/${dy}`;
      else if(period==="month")label=i%5===0?`${mo}/${dy}`:"";
      else label=date.slice(5,7)==="01"||i===0?date.slice(2,4)+"/"+mo+"월":"";
      return{date,v:parseFloat(pct.toFixed(3)),cur:lastSnap.current,inv:lastSnap.invested,label};
    }).filter(Boolean);
  },[dateList,allDates,history,target,period]);

  const curAcct=target==="total"?null:allAccounts.find(a=>a.id===target);
  const curColor=curAcct?curAcct.color:"#60a5fa";
  const nowPct=target==="total"?myPct:(curAcct?.pct||0);
  const nowPnl=target==="total"?myPnl:(()=>{if(!curAcct)return 0;return(curAcct.current-curAcct.invested)*(curAcct.shared ? 0.5 : 1);})();
  const nowCur=target==="total"?myTotal.current:(curAcct?curAcct.current*(curAcct.shared ? 0.5 : 1):0);
  const nowInv=target==="total"?myTotal.invested:(curAcct?curAcct.invested*(curAcct.shared ? 0.5 : 1):0);
  const periodPct=useMemo(()=>{
    if(chartData.length<2)return null;
    const f=chartData[0],l=chartData[chartData.length-1];
    if(!f?.inv)return null;
    return(l.cur-f.inv)/f.inv*100;
  },[chartData]);
  const hasData=chartData.length>=1;
  const dataCount=Object.keys(history).filter(d=>d>=GRAPH_START).length;

  return(
    <div style={{padding:"16px 16px 8px"}}>
      {/* 타겟 선택 */}
      <div style={{display:"flex",overflowX:"auto",gap:6,marginBottom:12,paddingBottom:2}}>
        {[{id:"total",icon:"📊",label:"총자산",color:"#60a5fa"},...ACCOUNTS.map(ac=>({id:ac.id,icon:ac.icon,label:ac.short,color:ac.color}))].map(item=>(
          <button key={item.id} onClick={()=>setTarget(item.id)} style={{flexShrink:0,padding:"6px 11px",borderRadius:20,fontSize:12,fontWeight:700,
            border:`1px solid ${target===item.id?item.color:"#1e3250"}`,
            background:target===item.id?item.color+"22":"transparent",
            color:target===item.id?item.color:C.muted}}>
            {item.icon} {item.label}
          </button>
        ))}
      </div>

      {/* 현재 수익 요약 */}
      <div style={{background:C.card,borderRadius:16,padding:"14px 16px",border:`1px solid ${C.border}`,borderLeft:`4px solid ${curColor}`,marginBottom:12}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:5}}>
          {target==="total"?"📊 내 총자산 (AMT 1/2 포함)":curAcct?`${curAcct.icon} ${curAcct.label}${curAcct.shared?" (1/2)":""}`:""} · 현재
        </div>
        <div style={{fontSize:26,fontWeight:800,color:"#f0f4f8",marginBottom:5,letterSpacing:-1}}>{won(nowCur)}</div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:C.sub}}>원금 {won(nowInv)}</span>
          <span style={{fontSize:13,fontWeight:700,color:nowPct>=0?"#e03131":"#1971c2",background:nowPct>=0?"#e0313120":"#1971c220",padding:"3px 10px",borderRadius:20}}>
            {nowPct>=0?"▲":"▼"} {Math.abs(nowPct).toFixed(2)}%
          </span>
          <span style={{fontSize:13,fontWeight:700,color:nowPnl>=0?"#e03131":"#1971c2"}}>{nowPnl>=0?"+":""}{won(nowPnl)}</span>
        </div>
      </div>

      {/* 기간 선택 */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {PERIODS.map(([k,v])=>(
          <button key={k} onClick={()=>setPeriod(k)} style={{flex:1,minHeight:36,fontSize:13,fontWeight:700,
            border:`1px solid ${period===k?curColor:"#1e3250"}`,
            background:period===k?curColor+"22":"transparent",
            borderRadius:10,color:period===k?curColor:"#527a96"}}>{v}</button>
        ))}
      </div>

      {/* 그래프 */}
      <div style={{background:C.card,borderRadius:16,padding:"14px 10px 10px",border:`1px solid ${C.border}`,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingLeft:4,paddingRight:4}}>
          <div style={{fontSize:12,color:C.sub}}>수익률 추이 (%)</div>
          {periodPct!==null&&(
            <span style={{fontSize:12,fontWeight:700,color:periodPct>=0?"#e03131":"#1971c2",background:periodPct>=0?"#e0313120":"#1971c220",padding:"2px 9px",borderRadius:12}}>
              기간 {periodPct>=0?"+":""}{periodPct.toFixed(2)}%
            </span>
          )}
        </div>
        {hasData
          ?<LineChart data={chartData} color={curColor} height={140}/>
          :<div style={{textAlign:"center",padding:"28px 16px"}}>
            <div style={{fontSize:36,marginBottom:10}}>📈</div>
            <div style={{fontSize:13,color:C.sub,lineHeight:2}}>
              {dataCount===0?(
                <><b style={{color:"#f0f4f8"}}>오늘부터 수익률 기록 시작!</b><br/>
                <span style={{fontSize:11,color:C.muted}}>매일 앱을 열면 데이터가 쌓여요.<br/>2일 후 1일 그래프, 7일 후 주간 그래프가 나타나요.</span></>
              ):(
                <>현재 <b style={{color:"#60a5fa"}}>{dataCount}일</b> 데이터 누적<br/>
                <span style={{fontSize:11,color:C.muted}}>
                  {period==="day"?"2일 이상":period==="week"?"7일 이상":period==="month"?"30일 이상":"더 많은 데이터"} 쌓이면 그래프 표시
                </span></>
              )}
            </div>
          </div>
        }
      </div>

      {/* 계좌별 수익률 바 */}
      <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:12}}>
        <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:12}}>계좌별 현재 수익률</div>
        {allAccounts.filter(ac=>(ac.list||[]).length>0).map(ac=>{
          const r=ac.shared ? 0.5 : 1,myCur=ac.current*r,myInv=ac.invested*r;
          const p=myInv>0?(myCur-myInv)/myInv*100:0;
          const w=Math.min(Math.abs(p),20)/20*100;
          return(
            <div key={ac.id} style={{marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:13,color:"#f0f4f8",fontWeight:600}}>{ac.icon} {ac.short}</span>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontSize:11,color:C.muted}}>{won(myCur)}</span>
                  <span style={{fontSize:12,fontWeight:700,color:p>=0?"#e03131":"#1971c2"}}>{p>=0?"▲":"▼"}{Math.abs(p).toFixed(2)}%</span>
                </div>
              </div>
              <div style={{height:5,background:"#111f33",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${w}%`,background:p>=0?"#e03131":"#1971c2",borderRadius:3,transition:"width .6s"}}/>
              </div>
            </div>
          );
        })}
        {allAccounts.every(ac=>!(ac.list||[]).length)&&<div style={{textAlign:"center",padding:"16px 0",color:C.muted,fontSize:13}}>종목을 추가하면 비교가 표시돼요</div>}
      </div>
      <div style={{background:C.card2,borderRadius:12,padding:"10px 14px",border:`1px solid ${C.border}`,fontSize:11,color:C.muted,textAlign:"center"}}>
        📅 2025년 10월 1일부터 기록 · <b style={{color:"#60a5fa"}}>{dataCount}일</b> 누적 · 매일 앱 열 때 자동 저장
      </div>
    </div>
  );
}


/* ★★★ [FREEZING핵심수정] CountdownBar — 완전 독립 컴포넌트
   매초 자기 자신만 리렌더 → App(계좌 탭 등) 전혀 영향 없음
   countdownRef를 prop으로 받아 자체 setInterval로 표시값만 관리 */
function CountdownBar({countdownRef,fetching,accent,border,muted,onRefresh,lastUp}){
  const[disp,setDisp]=useState(()=>countdownRef.current);
  useEffect(()=>{
    const t=setInterval(()=>setDisp(countdownRef.current),1000);
    return()=>clearInterval(t);
  },[countdownRef]);
  const total=disp>180?600:180;
  const pct=Math.max(0,Math.min(100,(disp/total)*100));
  const mins=Math.floor(disp/60),secs=(disp%60).toString().padStart(2,"0");
  return(<>
    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10}}>
      <div style={{flex:1,height:3,background:"#e5e7eb",borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",background:accent,width:`${pct}%`,transition:"width 1s linear",borderRadius:2}}/>
      </div>
      <span style={{fontSize:11,color:muted,whiteSpace:"nowrap"}}>{fetching?"⏳ 갱신중...":`🔄 ${mins}:${secs}`}</span>
      <button onClick={onRefresh} style={{minHeight:36,padding:"0 12px",background:"none",border:`1px solid ${border}`,borderRadius:8,color:accent,fontSize:12}}>지금</button>
    </div>
    <div style={{fontSize:11,color:muted,marginTop:3}}>{lastUp?`시세: ${lastUp}`:"⏳ 시세 갱신 중..."} · ETF·주식·환율 자동 / 펀드·CMA·적금 자동계산</div>
  </>);
}

/* ★ ModalInput - scrollIntoView로 키보드 올라올때 포커스 유지 */
const ModalInput=memo(function ModalInput({style,value,onChange,...rest}){
  const ref=useRef(null);
  const handleFocus=useCallback(()=>{
    setTimeout(()=>{if(ref.current)ref.current.scrollIntoView({behavior:"smooth",block:"center"});},300);
  },[]);
  return(<input ref={ref} value={value} onChange={onChange} onFocus={handleFocus} style={style} {...rest}/>);
});
const ModalSelect=memo(function ModalSelect({style,value,onChange,children}){
  return(<select value={value} onChange={onChange} style={style}>{children}</select>);
});

/* ★ USD 종목 카드 우측 표시 컴포넌트 */
function StockUsdDisplay({h, C, won, usd, pf, ProfitBadge}){
  const qty=parseFloat(h.qty)||0;
  const curUsdTotal=h.cur*qty;
  const avgUsdTotal=h.avg*qty;
  const pnlUsd=curUsdTotal-avgUsdTotal;
  const pnlCol=h.pct>=0?C.up:C.dn;
  return(<>
    <div style={{fontSize:12,fontWeight:700,color:C.sub}}>{usd(curUsdTotal)}</div>
    <div style={{fontSize:11,fontWeight:600,color:pnlCol}}>{pnlUsd>=0?"+":""}{usd(pnlUsd)} ({pf(h.pct)})</div>
    <div style={{fontSize:15,fontWeight:800,color:C.text,marginTop:2}}>{won(h.current)}</div>
    <ProfitBadge pct={h.pct} pnl={h.pnl} size="sm"/>
  </>);
}

/* ★ 계좌 헤더 우측 USD 총액 컴포넌트 */
function AcctHeaderUsd({curData, C, won, usd, pf, ProfitBadge}){
  const usdList=(curData.list||[]).filter(h=>h.currency==="USD");
  if(usdList.length>0){
    const usdCur=usdList.reduce((s,h)=>s+(h.cur*(parseFloat(h.qty)||0)),0);
    const usdInv=usdList.reduce((s,h)=>s+(h.avg*(parseFloat(h.qty)||0)),0);
    const usdPnl=usdCur-usdInv;
    const usdPct=usdInv>0?usdPnl/usdInv*100:0;
    const pnlCol=usdPct>=0?C.up:C.dn;
    return(<div>
      <div style={{fontSize:13,fontWeight:700,color:C.sub}}>{usd(usdCur)}</div>
      <div style={{fontSize:11,fontWeight:600,color:pnlCol,marginBottom:2}}>{usdPnl>=0?"+":""}{usd(usdPnl)} ({pf(usdPct)})</div>
      <div style={{fontSize:20,fontWeight:800,color:C.text}}>{won(curData.current)}</div>
      <ProfitBadge pct={curData.pct} pnl={curData.pnl}/>
    </div>);
  }
  return(<div>
    <div style={{fontSize:20,fontWeight:800,color:C.text}}>{won(curData.current)}</div>
    <ProfitBadge pct={curData.pct} pnl={curData.pnl}/>
  </div>);
}

  // ★ [freezing 수정] onTouchMove 제거 → useEffect에서 passive:false로 직접 등록

  useEffect(()=>{

      if(!e.touches||!e.touches[0])return;
      const dx=touchStartX.current-e.touches[0].clientX;
      const dy=touchStartY.current-e.touches[0].clientY;
      const absDx=Math.abs(dx);
      const absDy=Math.abs(dy);

      // ★★★ 수직 방향이 우세하면 절대 preventDefault 안 함 → 네이티브 스크롤 허용

    const endY=e.changedTouches[0].clientY;
    const endX=e.changedTouches[0].clientX;
    const diffY=endY-touchStartY.current;
    const rawDx=endX-touchStartX.current;

    const idx=TABS.indexOf(tabRef.current);

  const fetchPrices=useCallback(async(hMap)=>{

          const r=await fetch(url,{signal:c.signal,headers:hdrs||{"User-Agent":"Mozilla/5.0"}});

        try{
          const d=(raw?.contents)?JSON.parse(raw.contents):raw;

          const q=d?.quoteResponse?.result?.[0];

        return null;

      // 모든 소스 동시 시도

        tf("https://corsproxy.io/?url="+encodeURIComponent(yUrl1),9000)
          .then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
        tf("https://corsproxy.io/?url="+encodeURIComponent(qUrl1),9000)
          .then(j=>{const r=pV7(j);if(!r)throw 0;return r;}),

        tf("https://api.allorigins.win/get?url="+encodeURIComponent(yUrl1),9000)
          .then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),

          .then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
        // --- thingproxy ---
        tf("https://thingproxy.freeboard.io/fetch/"+yUrl1,10000)
          .then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
        // --- yacdn ---
        tf("https://yacdn.org/proxy/"+yUrl1,10000)
          .then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
        // --- crossorigin.me ---
        tf("https://crossorigin.me/"+yUrl1,10000)

  useEffect(()=>{fetchPricesRef.current=fetchPrices;},[fetchPrices]);

  // ★★★ [FREEZING 핵심수정] countdown을 완전히 ref로만 관리
  // setCountdown(state)를 매초 호출하면 전체 App 리렌더 → 계좌탭에서 폭발적 freezing
  // → countdown은 ref만 사용, 렌더에 필요한 표시값은 별도 CountdownBar 컴포넌트로 분리
  const getRefreshInterval=()=>{const d=new Date(),h=d.getHours(),day=d.getDay();return(day>0&&day<6&&h>=9&&h<16)?180:600;};
  // ★★★ [FREEZING 핵심수정] countdownRef만 사용 - state 완전 제거
  // setInterval이 setCountdown(state)를 호출하지 않으므로 App 리렌더 없음
  const countdownRef=useRef(getRefreshInterval());
  useEffect(()=>{
    const t=setInterval(()=>{
      countdownRef.current=countdownRef.current-1;
      if(countdownRef.current<=0){
        countdownRef.current=getRefreshInterval();
        if(fetchPricesRef.current)fetchPricesRef.current(holdingsRef.current);
      }
      // ★ setCountdown 호출 완전 제거 → App 리렌더 없음
      // CountdownBar 컴포넌트가 자체적으로 자신만 리렌더
    },1000);
    return()=>clearInterval(t);
  },[]);// eslint-disable-line

  /* 수익 계산 */
  const calcH=useCallback((h,aid,snap,fx)=>{
    const ac=ACCOUNTS.find(a=>a.id===aid),pr=snap||prices,rate=fx||fxRateRef.current||fxRate;
    if(ac?.directInput||h.assetType==="직접입력"){const inv=parseFloat(h.principal)||0,cur=parseFloat(h.evalAmount)||0,pnl=cur-inv,p=inv>0?pnl/inv*100:0;return{...h,invested:inv,current:cur,pnl,pct:p,pInfo:null,dayChg:null,calcMode:"direct"};}
    if(h.assetType==="CMA"&&h.startDate&&h.rate&&h.principal){const c=calcCMA(h);if(c)return{...h,...c,pInfo:null,dayChg:null,calcMode:"cma"};}
    if(h.assetType==="적금"&&h.startDate&&h.rate){const s=calcSavings(h);if(s)return{...h,...s,pInfo:null,dayChg:null,calcMode:"savings"};}
    if(h.assetType==="펀드"&&h.nav&&h.qty){const f=calcFund(h);if(f)return{...h,...f,pInfo:null,dayChg:null,calcMode:"fund"};}
    const pk=h.ticker?((h.assetType==="국내ETF"||h.assetType==="국내주식")?h.ticker+".KS":h.ticker):"";
    const pInfo=pk?pr[pk]:null;
    const cur=pInfo?pInfo.price:(parseFloat(h.currentPrice)||parseFloat(h.avgPrice)||0);
    const avg=parseFloat(h.avgPrice)||0,qty=parseFloat(h.qty)||0;
    if(qty<=0)return{...h,qty:0,avg,cur,invested:0,current:0,pnl:0,pct:0,pInfo,dayChg:null,calcMode:"manual"};
    const ck=toKRW(cur,h.currency||"KRW",rate),ak=toKRW(avg,h.currency||"KRW",rate);
    const inv=ak*qty,curr=ck*qty,pnl=curr-inv,p=inv>0?pnl/inv*100:0;
    const dayChg=pInfo?(pInfo.price-pInfo.prev)/pInfo.prev*100:null;
    const isAuto=AUTO_TYPES.includes(h.assetType)&&!!h.ticker;
    return{...h,qty,avg,cur,curKRW:ck,avgKRW:ak,invested:inv,current:curr,pnl,pct:p,pInfo,dayChg,isAuto,calcMode:isAuto?"auto":"manual"};
  },[prices,fxRate]);

  const calcAcct=useCallback((aid)=>{
    const list=(holdings[aid]||[]).map(h=>calcH(h,aid,prices,fxRate));
    const inv=list.reduce((s,h)=>s+(h.invested||0),0),cur=list.reduce((s,h)=>s+(h.current||0),0);
    const ytdPnl=list.reduce((s,h)=>s+(h.calcMode==="cma"?(h.yearInterest??h.pnl??0):(h.pnl||0)),0);
    const totalInterest=list.reduce((s,h)=>s+(h.calcMode==="cma"?(h.totalInterest||0):0),0);
    return{list,invested:inv,current:cur,pnl:ytdPnl,pct:inv>0?(ytdPnl/inv)*100:0,totalInterest};
  },[holdings,prices,fxRate,calcH]);

  // ★ allAccounts: acctOrder 순서 적용
  const allAccounts=useMemo(()=>{
    const base=ACCOUNTS.map(ac=>({...ac,...calcAcct(ac.id)}));
    return acctOrder.map(id=>base.find(a=>a.id===id)).filter(Boolean);
  },[calcAcct,acctOrder]);

  /* ★ 내 총자산 */
  // current: 전체 계좌 합산 (amtcma×0.5, mycma 포함) → 상단 총금액
  // invested/pnl/pct: CMA 제외 (amtcma, mycma 제외) → 투자원금/수익률 계산
  const myTotal=useMemo(()=>{
    const current=allAccounts.reduce((s,ac)=>{
      const r=ac.shared ? 0.5 : 1;
      return s+ac.current*r;
    },0);
    // 투자원금·수익 계산에서 CMA 계좌 제외
    const nonCma=allAccounts.filter(ac=>!ac.cmaType);
    const invested=nonCma.reduce((s,ac)=>{
      const r=ac.shared ? 0.5 : 1;
      return s+ac.invested*r;
    },0);
    return{current,invested};
  },[allAccounts]);
  const myPnl=useMemo(()=>{
    const nonCma=allAccounts.filter(ac=>!ac.cmaType);
    return nonCma.reduce((s,ac)=>{
      const r=ac.shared ? 0.5 : 1;
      return s+(ac.current-ac.invested)*r;
    },0);
  },[allAccounts]);
  const myPct=myTotal.invested>0?myPnl/myTotal.invested*100:0;

  const curAcct=useMemo(()=>ACCOUNTS.find(a=>a.id===acctTab),[acctTab]);
  const curData=useMemo(()=>calcAcct(acctTab),[calcAcct,acctTab]);
  const mAcct=useMemo(()=>ACCOUNTS.find(a=>a.id===(form._acctId||acctTab)),[form._acctId,acctTab]);

  // ★★★ [버그수정] allAccounts/myTotal 정의 이후로 이동 — TDZ(전방참조) 오류 완전 해결
  // 수익률 스냅샷 저장 - prices 변경될 때마다 (오늘 데이터 즉시 갱신)
  useEffect(()=>{
    if(!allAccounts.length)return;
    const today=new Date().toISOString().slice(0,10);
    if(today<GRAPH_START)return;
    try{
      const hist=ld(SK_HISTORY,{});
      const snap={total:{invested:myTotal.invested,current:myTotal.current}};
      allAccounts.forEach(ac=>{const r=ac.shared?0.5:1;snap[ac.id]={invested:ac.invested*r,current:ac.current*r};});
      hist[today]=snap;
      const keys=Object.keys(hist).sort();
      if(keys.length>366)keys.slice(0,keys.length-366).forEach(k=>delete hist[k]);
      sv(SK_HISTORY,hist);
      setHistory({...hist});
    }catch(e){}
  },[allAccounts,myTotal,prices]);

  // postMessage: 부모(index.html)에 요약 데이터 전송
  useEffect(()=>{
    const accts=allAccounts.filter(a=>a.current>0).map(a=>({short:a.short,color:a.color}));
    const cmaAccts=allAccounts.filter(ac=>ac.cmaType);
    const nonCmaAccts=allAccounts.filter(ac=>!ac.cmaType);
    const cmaTotal=cmaAccts.reduce((s,ac)=>s+ac.current*(ac.shared?0.5:1),0);
    const cmaPnl=cmaAccts.reduce((s,ac)=>s+(ac.pnl||0)*(ac.shared?0.5:1),0);
    const stockOnly=nonCmaAccts.reduce((s,ac)=>s+ac.current*(ac.shared?0.5:1),0);
    const stockGrossTotal=nonCmaAccts.reduce((s,ac)=>s+ac.current,0);
    const mySixAcctTotal=stockOnly;
    const grossTotal=allAccounts.reduce((s,ac)=>s+ac.current,0);
    let dayPnl=0,dayBase=0;
    nonCmaAccts.forEach(ac=>{
      const r=ac.shared?0.5:1;
      (ac.list||[]).forEach(h=>{
        if(h.dayChg!=null&&h.current>0&&h.dayChg>-99){
          const prevVal=h.current/(1+h.dayChg/100);
          if(prevVal>0){dayPnl+=(h.current-prevVal)*r;dayBase+=prevVal*r;}
        }
      });
    });
    const dayPct=dayBase>0?dayPnl/dayBase*100:0;
    // ★ 종목별 계좌 수익률 맵 (ticker+accountId → 각 holding의 pnl/pct 그대로)
    // stock 화면에 보이는 수치와 완전히 동일하게: h.pnl / h.invested 직접 사용
    // shared 계좌(AMT)도 ×0.5 없이 — 종목 카드에 표시되는 수익률은 지분 미적용 원본
    const tickerPnl={};
    nonCmaAccts.forEach(ac=>{
      (ac.list||[]).forEach(h=>{
        if(!h.ticker)return;
        const inv=h.invested||0;
        const cur=h.current||0;
        const pnl=h.pnl||(cur-inv);
        const pct=inv>0?pnl/inv*100:0;
        if(inv===0&&cur===0)return; // 보유 없으면 스킵
        // 같은 티커가 여러 계좌에 있을 수 있으므로 계좌별로 별도 저장
        const key=h.ticker+'__'+ac.id;
        tickerPnl[key]={ticker:h.ticker,acctId:ac.id,invested:inv,current:cur,pnl,pct};
        // 티커만으로도 접근 가능하도록 (지정 계좌 우선)
        // 지정 계좌 매핑: VOO→general, QQQM→general, 360750→amt, ...
        if(!tickerPnl[h.ticker]){
          tickerPnl[h.ticker]={ticker:h.ticker,acctId:ac.id,invested:inv,current:cur,pnl,pct};
        }
      });
    });
    // ★ 지정 계좌 우선 적용: 티커별로 올바른 계좌의 수익률로 덮어씀
    const WL_ACCT_MAP={
      'VOO':'general','QQQM':'general',
      '360750':'amt','133690':'amt','0047A0':'amt','VUG':'amt',
      'UNH':'general','LLY':'general','NEE':'general','VST':'general',
      'SPYM':'general','WHWK':'general',
      '438080':'pension'
    };
    Object.keys(WL_ACCT_MAP).forEach(ticker=>{
      const acctId=WL_ACCT_MAP[ticker];
      const key=ticker+'__'+acctId;
      if(tickerPnl[key]){
        // 지정 계좌 데이터로 티커 키를 덮어씀
        tickerPnl[ticker]=tickerPnl[key];
      }
    });
    try{
      window.parent.postMessage({
        type:'STOCK_SUMMARY',
        total:myTotal.current,
        personalTotal:myTotal.current,
        grossTotal,stockOnly,stockGrossTotal,mySixAcctTotal,
        invested:myTotal.invested,
        pnl:myPnl,pct:myPct,
        cmaTotal,cmaPnl,
        cmaDetails:cmaAccts.map(ac=>({
          id:ac.id,label:ac.label,icon:ac.icon,color:ac.color,shared:ac.shared,
          principal:(ac.list||[]).reduce((s,h)=>s+(parseFloat(h.principal)||0),0),
          current:ac.current,pnl:ac.pnl,pct:ac.pct,
          totalInterest:ac.totalInterest||0,
          rate:(ac.list||[])[0]?.rate||0,
          days:(ac.list||[])[0]?.days||0,
          dailyInterest:(ac.list||[]).reduce((s,h)=>s+(h.dailyInterest||0),0),
          items:(ac.list||[]).map((h,idx)=>({
            idx,name:h.name,
            principal:parseFloat(h.principal)||0,
            current:h.current||0,
            yearInterest:h.yearInterest??h.pnl??0,
            totalInterest:h.totalInterest||0,
            dailyInterest:h.dailyInterest||0,
            rate:parseFloat(h.rate)||0,
            startDate:h.startDate||'',
            days:h.days||0,
            memo:h.memo||''
          }))
        })),
        dayPnl,dayPct,fxRate,fxAuto,fxTime,accts,tickerPnl
      },'*');
    }catch(e){}
  },[myTotal,myPnl,myPct,allAccounts,fxRate,fxAuto,fxTime]);

  /* ★ 계좌 순서 변경 */
  const moveAcct=useCallback((id,dir)=>{
    setAcctOrder(prev=>{
      const arr=[...prev];
      const i=arr.indexOf(id);
      if(i<0)return arr;
      const j=dir==="up"?i-1:i+1;
      if(j<0||j>=arr.length)return arr;
      [arr[i],arr[j]]=[arr[j],arr[i]];
      sv(SK_ACCT_ORDER,arr);
      return arr;
    });
  },[]);

  /* ★ 종목 순서 변경 */
  const moveItem=useCallback((aid,idx,dir)=>{
    setHoldings(prev=>{
      const list=[...(prev[aid]||[])];
      const j=dir==="up"?idx-1:idx+1;
      if(j<0||j>=list.length)return prev;
      [list[idx],list[j]]=[list[j],list[idx]];
      const next={...prev,[aid]:list};
      holdingsRef.current=next;
      sv(SK,{holdings:next,fxRate});
      return next;
    });
  },[fxRate]);

  /* CRUD */
  const openAdd=useCallback(()=>{
    const ac=ACCOUNTS.find(a=>a.id===acctTab);
    // CMA 계좌는 assetType="CMA" 고정
    const dt=ac.cmaType?"CMA":ac.types.every(t=>t.includes("미국"))?"미국주식":ac.types[0];
    setForm({_acctId:acctTab,assetType:dt,currency:dt.includes("미국")?"USD":"KRW"});
    setEditIdx(null);setModal("holding");
  },[acctTab]);
  // ★ 단일 티커 즉시 조회 (모달 열릴때, 항상 최신 시세)
  const fetchSingleTicker=useCallback(async(ticker,assetType)=>{
    if(!ticker||!AUTO_TYPES.includes(assetType)||assetType==="CMA")return;
    const tk=(assetType==="국내ETF"||assetType==="국내주식")?ticker+".KS":ticker;
    const now=()=>new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    const tf=async(url,ms,hdrs)=>{
      const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);
      try{
        const r=await fetch(url,{signal:c.signal,headers:hdrs||{}});
        clearTimeout(t);if(!r.ok)throw new Error(r.status);
        const txt=await r.text();if(!txt||txt.startsWith("<")||txt.startsWith("<!"))throw new Error("html");
        return JSON.parse(txt);
      }catch(e){clearTimeout(t);throw e;}
    };
    const pV8=raw=>{
      try{const d=(raw?.contents)?JSON.parse(raw.contents):raw;const m=d?.chart?.result?.[0]?.meta;
        if(m?.regularMarketPrice&&m.regularMarketPrice>0)return{price:m.regularMarketPrice,prev:m.chartPreviousClose||m.regularMarketPrice,currency:m.currency||"KRW",time:now()};}catch(e){}return null;
    };
    const pV7=raw=>{
      try{const d=(raw?.contents)?JSON.parse(raw.contents):raw;const q=d?.quoteResponse?.result?.[0];
        if(q?.regularMarketPrice&&q.regularMarketPrice>0)return{price:q.regularMarketPrice,prev:q.regularMarketPreviousClose||q.regularMarketPrice,currency:q.currency||"KRW",time:now()};}catch(e){}return null;
    };
    const save=r=>{setPrices(prev=>{const next={...prev,[tk]:r};sv(SK_PRICES,next);return next;});};
    const y1="https://query1.finance.yahoo.com/v8/finance/chart/"+tk+"?interval=1d&range=1d";
    const y2="https://query2.finance.yahoo.com/v8/finance/chart/"+tk+"?interval=1d&range=1d";
    const q1="https://query1.finance.yahoo.com/v7/finance/quote?symbols="+tk;
    const q2="https://query2.finance.yahoo.com/v7/finance/quote?symbols="+tk;
    const sources=[
      tf("https://api.allorigins.win/get?url="+encodeURIComponent(y1),8000).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
      tf("https://api.allorigins.win/get?url="+encodeURIComponent(y2),8000).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
      tf("https://api.allorigins.win/get?url="+encodeURIComponent(q1),8000).then(j=>{const r=pV7(j);if(!r)throw 0;return r;}),
      tf("https://api.allorigins.win/get?url="+encodeURIComponent(q2),8000).then(j=>{const r=pV7(j);if(!r)throw 0;return r;}),
      tf("https://corsproxy.io/?url="+encodeURIComponent(y1),9000).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
      tf("https://corsproxy.io/?"+encodeURIComponent(y1),9000).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
      tf("https://corsproxy.io/?"+encodeURIComponent(q1),9000).then(j=>{const r=pV7(j);if(!r)throw 0;return r;}),
      tf("https://thingproxy.freeboard.io/fetch/"+y1,10000).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
      tf("https://proxy.cors.sh/"+y1,10000,{"x-cors-api-key":"temp_pf"}).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
    ];
    try{const r=await Promise.any(sources);if(r)save(r);}
    catch(e){
      await new Promise(res=>setTimeout(res,2000));
      try{const r=await Promise.any([
        tf("https://api.allorigins.win/get?url="+encodeURIComponent(y1),10000).then(j=>{const r=pV8(j);if(!r)throw 0;return r;}),
        tf("https://api.allorigins.win/get?url="+encodeURIComponent(q1),10000).then(j=>{const r=pV7(j);if(!r)throw 0;return r;}),
      ]);if(r)save(r);}catch(e2){}
    }
  },[]);

  const openEdit=useCallback((aid,idx)=>{
    const h=holdings[aid][idx];
    setForm({...h,_acctId:aid,principalDisplay:h.principal?Number(h.principal).toLocaleString("ko-KR"):""});
    setEditIdx(idx);
    setModal("holding");
    // ★ 모달 열자마자 해당 종목 시세 즉시 조회
    if(h.ticker&&AUTO_TYPES.includes(h.assetType)){
      fetchSingleTicker(h.ticker,h.assetType);
    }
  },[holdings,fetchSingleTicker]);
  const saveHolding=useCallback(()=>{
    if(!form.name?.trim()){showToast("종목명을 입력해주세요.","error");return;}
    const aid=form._acctId,ac=ACCOUNTS.find(a=>a.id===aid);
    const prevEntry=editIdx!==null?(holdings[aid]||[])[editIdx]:null;
    let entry;
    if(ac?.directInput){
      entry={name:form.name.trim(),assetType:form.assetType||ac.types[0],principal:form.principal||"0",evalAmount:form.evalAmount||"0",memo:form.memo||""};
    }
    else if(form.assetType==="CMA"){
      if(!form.startDate){showToast("기산일을 입력해주세요.","error");return;}
      if(form.principal===""||form.principal===null||form.principal===undefined){showToast("잔액을 입력해주세요.","error");return;}
      const balanceNum=parseFloat(form.principal)||0;
      const todayStr=new Date().toISOString().slice(0,10);
      // ★★ 새 방식: 입력값 = 현재 잔액(원금+이자 합산)
      // 잔액이 변경되면 현재까지 누적이자를 보존하고 오늘을 새 기산일로 설정
      let savedYI=parseFloat(prevEntry?.savedYearInterest)||0;
      let savedTI=parseFloat(prevEntry?.savedTotalInterest)||0;
      let newStartDate=form.startDate;
      if(prevEntry&&prevEntry.assetType==="CMA"){
        const prevBalance=parseFloat(prevEntry.principal)||0;
        const balanceChanged=Math.abs(prevBalance-balanceNum)>0.0001;
        if(balanceChanged){
          // 현재까지 쌓인 이자를 계산해서 보존
          const prevCalc=calcCMA(prevEntry);
          if(prevCalc){
            savedYI=prevCalc.yearInterest||0;
            savedTI=prevCalc.totalInterest||0;
          }
          // 오늘을 새 기산일로 갱신 (내일부터 새 잔액 기준 이자 시작)
          newStartDate=todayStr;
        }
      }
      entry={
        name:form.name.trim(),
        assetType:"CMA",
        principal:String(balanceNum),
        rate:form.rate||"0",
        startDate:newStartDate,
        memo:form.memo||"",
        savedYearInterest:savedYI,
        savedTotalInterest:savedTI
      };
    }
    else if(form.assetType==="적금"){
      if(!form.startDate){showToast("가입일을 입력해주세요.","error");return;}
      entry={name:form.name.trim(),assetType:"적금",principal:form.principal||"0",rate:form.rate||"0",startDate:form.startDate,memo:form.memo||""};

    else if(form.assetType==="펀드"){
      entry={name:form.name.trim(),assetType:"펀드",nav:form.nav||"0",qty:form.qty||"0",avgNav:form.avgNav||"0",memo:form.memo||""};

    else{

    }
    const list=[...(holdings[aid]||[])];
    if(editIdx!==null)list[editIdx]=entry;else list.push(entry);
    const next={...holdings,[aid]:list};
    setHoldings(next);holdingsRef.current=next;
    if(!ac?.cmaType&&entry.assetType!=="적금"&&entry.assetType!=="펀드"&&entry.assetType!=="CMA")fetchPrices(next);
    setModal(null);setForm({});setEditIdx(null);
    showToast(editIdx!==null?"수정 완료!":"종목 추가 완료!");
  },[form,editIdx,holdings,fetchPrices,showToast]);

  /* ★ CMA 입금/출금 실행 */
  const applyCmaTransfer=useCallback(()=>{
    if(!cmaTransfer)return;
    const{aid,idx,type,amount}=cmaTransfer;
    const amtNum=parseFloat((amount||"").replace(/,/g,""))||0;
    if(amtNum<=0){showToast("금액을 올바르게 입력해주세요.","error");return;}
    const h=(holdings[aid]||[])[idx];
    if(!h||h.assetType!=="CMA"){showToast("CMA 종목을 찾을 수 없습니다.","error");return;}
    const prevBalance=parseFloat(h.principal)||0;
    const newBalance=type==="deposit"?prevBalance+amtNum:prevBalance-amtNum;
    if(newBalance<0){showToast("출금액이 잔액을 초과합니다.","error");return;}
    // 현재까지 쌓인 이자 보존
    const prevCalc=calcCMA(h);
    const savedYI=prevCalc?prevCalc.yearInterest||0:parseFloat(h.savedYearInterest)||0;
    const savedTI=prevCalc?prevCalc.totalInterest||0:parseFloat(h.savedTotalInterest)||0;
    const todayStr=new Date().toISOString().slice(0,10);
    const entry={
      ...h,
      principal:String(newBalance),
      startDate:todayStr,
      savedYearInterest:savedYI,
      savedTotalInterest:savedTI
    };
    const list=[...(holdings[aid]||[])];
    list[idx]=entry;
    const next={...holdings,[aid]:list};
    setHoldings(next);holdingsRef.current=next;
    sv(SK,{holdings:next,fxRate});
    setCmaTransfer(null);
    const label=type==="deposit"?"입금":"출금";

          <div style={{padding:16}}>
            <div style={{background:"#ffffff",borderRadius:16,padding:18,border:`1px solid ${C.border}`,borderTop:`3px solid ${curAcct.color}`,marginBottom:16}}>
              {curAcct.cmaType&&cmaReturnContext.current?.active&&(<div style={{marginBottom:12,padding:"10px 12px",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,fontSize:12,color:C.sub,lineHeight:1.6}}>↔️ CMA 계좌 화면에서는 좌우 스와이프 또는 상단 버튼으로 이전 화면으로 돌아갈 수 있어요.</div>)}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,marginRight:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
                    <span style={{fontSize:18,fontWeight:800,color:C.text}}>{curAcct.icon} {curAcct.label}</span>
                    {curAcct.shared&&<span style={{fontSize:11,color:"#f59e0b",background:"#f59e0b1a",padding:"2px 8px",borderRadius:10}}>🤝 공동계좌</span>}
                    {curAcct.pensionHint&&<span style={{fontSize:11,color:"#a78bfa",background:"#a78bfa1a",padding:"2px 8px",borderRadius:10}}>🏦 퇴직연금</span>}
                  </div>
                  {curAcct.pensionHint&&<div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>국내ETF: 티커+수량+평균단가 → 자동시세 | 펀드: 기준가+보유좌수 → 자동계산</div>}
                  {curAcct.shared?(
                    <div style={{marginTop:2}}>
                      <div style={{fontSize:12,color:C.muted}}>{curAcct.cmaType?`전체 잔액 ${won(curData.invested)}`:`AMT 투자원금 ${won(curData.invested)}`}</div>
                      <div style={{fontSize:12,marginTop:1}}>{curAcct.cmaType?<><span style={{color:C.text}}>내 지분 1/2</span> <span style={{color:C.green}}>{won(curData.invested*0.5)}</span></>:<><span style={{color:C.text}}>내 투자원금</span> <span style={{color:C.green}}>{won(curData.invested*0.5)}</span></>}</div>
                    </div>
                  ):(
                    <div style={{fontSize:12,color:C.muted,marginTop:4}}>{curAcct.cmaType?"현재 잔액":"투자원금"} {won(curData.invested)}</div>
                  )}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  {curAcct.shared?(
                    <div>
                      <div style={{fontSize:20,fontWeight:800,color:C.text}}>{won(curData.current)}</div>
                      <div style={{fontSize:11,marginTop:1}}>{curAcct.cmaType?<><span style={{color:C.text}}>내 지분 1/2</span> <span style={{color:C.green}}>{won(curData.current*0.5)}</span></>:`내 평가금액 `}<span style={{color:C.green,fontWeight:800}}>{won(curData.current*0.5)}</span></div>
                      <div style={{marginTop:4}}><ProfitBadge pct={curData.pct} pnl={curData.pnl}/></div>
                    </div>
                  ):(
                    <AcctHeaderUsd curData={curData} fxRate={fxRate} C={C} won={won} usd={usd} pf={pf} ProfitBadge={ProfitBadge}/>
                  )}
                </div>
              </div>
              <MiniBar pct={curData.pct}/>
            </div>
            {!curAcct.directInput&&(<div style={{background:"#f0f4f8",borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`,marginBottom:12,fontSize:12,color:C.sub,lineHeight:1.7}}>
              🔄 <b style={{color:C.text}}>ETF·주식</b>: 티커 입력 → 자동시세 (10~20분지연)<br/>
              📊 <b style={{color:C.text}}>펀드</b>: 기준가 입력 → 평가금액 자동계산<br/>
              💳 <b style={{color:"#06b6d4"}}>CMA</b>: 원금+연이율+기산일 → 일이자 자동계산 / 올해 누적이자 표시<br/>
              💰 <b style={{color:C.text}}>적금</b>: 원금+금리+가입일 → 이자 매일 자동계산
            </div>)}
            {curData.list.length===0&&(<div style={{textAlign:"center",padding:"44px 0",color:C.muted}}>
              <div style={{fontSize:44,marginBottom:12}}>📭</div>
              <div style={{fontSize:14,color:C.sub,lineHeight:1.8}}>{curAcct.pensionHint?"퇴직연금: ETF 티커 입력 시 자동시세, 펀드 기준가+좌수로 자동계산":"아래 버튼으로 종목을 추가하세요"}</div>
            </div>)}
            {curData.list.map((h,i)=>{
              const det=cardDet(h,curAcct);
              const totalItems=curData.list.length;
              return(<div key={i} style={{background:"#ffffff",borderRadius:14,padding:16,border:`1px solid ${editingItemOrder?C.accent+"44":C.border}`,borderLeft:`3px solid ${curAcct.color}`,marginBottom:12,position:"relative"}}>
                {/* 순서 편집 오버레이 */}
                {editingItemOrder&&(
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>moveItem(acctTab,i,"up")} disabled={i===0}
                        style={{width:40,height:40,background:i===0?C.card2:"#eff6ff",border:`1px solid ${i===0?C.border:C.accent}`,borderRadius:10,color:i===0?C.muted:C.accent,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>▲</button>
                      <button onClick={()=>moveItem(acctTab,i,"dn")} disabled={i===totalItems-1}
                        style={{width:40,height:40,background:i===totalItems-1?C.card2:"#eff6ff",border:`1px solid ${i===totalItems-1?C.border:C.accent}`,borderRadius:10,color:i===totalItems-1?C.muted:C.accent,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>▼</button>
                    </div>
                    <div style={{flex:1,fontSize:14,fontWeight:700,color:C.text}}>{h.name}</div>
                    <div style={{fontSize:20,color:C.muted,fontWeight:700}}>#{i+1}</div>
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div style={{flex:1,marginRight:10}}>
                    <div style={{fontSize:15,fontWeight:800,color:C.text,lineHeight:1.4}}>
                      {h.name}
                      {(h.qty&&parseFloat(h.qty)>0)&&<span style={{fontSize:12,color:C.muted,fontWeight:400,marginLeft:6}}>({nf(parseFloat(h.qty))}{h.assetType==="펀드"||h.assetType==="국내ETF"?"좌":"주"})</span>}
                      {h.assetType==="적금"&&h.principal&&<span style={{fontSize:12,color:C.muted,fontWeight:400,marginLeft:6}}>({won(h.principal)})</span>}
                    </div>
                    <div style={{fontSize:12,color:C.muted,marginTop:4,display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{background:"#eff6ff",border:"1px solid #bfdbfe",padding:"2px 8px",borderRadius:5,color:"#1d4ed8",fontWeight:700}}>{h.assetType}</span>
                      {!curAcct.directInput&&h.ticker&&<span style={{background:"#eff6ff",border:"1px solid #bfdbfe",padding:"2px 8px",borderRadius:5,color:"#1d4ed8",fontWeight:700}}>{h.ticker}</span>}
                      {h.calcMode==="auto"&&h.pInfo&&h.pInfo.time&&<span style={{color:C.green,fontWeight:600}}>● 자동 {h.pInfo.time}</span>}
                      {h.calcMode==="auto"&&h.pInfo&&!h.pInfo.time&&<span style={{color:"#f59e0b",fontWeight:600}}>● {fetching?"갱신중...":"이전시세"}</span>}
                      {h.calcMode==="auto"&&!h.pInfo&&h.ticker&&<span style={{color:fetching?"#60a5fa":"#f59e0b",fontWeight:600}}>● {fetching?"⏳ 조회중...":"시세없음"}</span>}
                      {h.calcMode==="cma"&&<span style={{color:"#06b6d4",fontWeight:600}}>💳 CMA 이자 자동계산</span>}
                      {h.calcMode==="savings"&&<span style={{color:"#fb923c",fontWeight:600}}>💰 이자 자동계산</span>}
                      {h.calcMode==="fund"&&<span style={{color:C.green,fontWeight:600}}>📊 기준가 방식</span>}
                      {h.calcMode==="manual"&&!curAcct.directInput&&!h.ticker&&<span style={{color:"#f59e0b"}}>✏️ 수동</span>}
                      {h.dayChg!==null&&<span style={{color:h.dayChg>=0?C.up:C.dn}}>당일 {h.dayChg>=0?"+":""}{h.dayChg?.toFixed(2)}%</span>}
                      {/* ★ 미국주식/ETF 환율 표시 */}
                      {h.currency==="USD"&&<span style={{color:"#60a5fa",fontWeight:600}}>$1=₩{fxRate}</span>}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {/* ★ 미국주식/ETF: 달러+원화 동시 표시 */}
                    {h.currency==="USD"?(
                      <StockUsdDisplay h={h} C={C} won={won} usd={usd} pf={pf} ProfitBadge={ProfitBadge}/>
                    ):(
                      <>
                        <div style={{fontSize:15,fontWeight:800,color:C.text}}>{won(h.current)}</div>
                        <ProfitBadge pct={h.pct} size="sm"/>
                      </>
                    )}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"12px 0",borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,marginBottom:12}}>
                  {det.map(([l,v],j)=>(
                    <div key={j} style={{textAlign:"center"}}>
                      <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div>
                      {/* ★ 줄바꿈 처리 (달러\n원화) */}
                      {v.includes("\n")?(<>
                        {v.split("\n").map((line,li)=><div key={li} style={{fontSize:li===0?11:12,fontWeight:li===0?400:700,color:li===0?C.muted:C.text}}>{line}</div>)}
                      </>):(
                        <div style={{fontSize:12,fontWeight:700,color:(l==="수익금"||l==="이자")?(h.pnl>=0?C.up:C.dn):l==="전일이자"?C.up:C.text}}>{v}</div>
                      )}
                    </div>
                  ))}
                </div>
                <MiniBar pct={h.pct}/>

                {h.memo&&<div style={{fontSize:12,color:C.muted,marginTop:8,fontStyle:"italic"}}>📝 {h.memo}</div>}
                {/* ★ CMA 입금/출금 버튼 */}
                {h.calcMode==="cma"&&(
                  <div style={{marginTop:12}}>
                    {/* 입금/출금 토글 버튼 */}
                    {(!cmaTransfer||(cmaTransfer.aid!==acctTab||cmaTransfer.idx!==i))&&(
                      <div style={{display:"flex",gap:6,marginBottom:0}}>
                        <button onClick={()=>setCmaTransfer({aid:acctTab,idx:i,type:"deposit",amount:""})}
                          style={{flex:1,minHeight:40,fontSize:13,fontWeight:700,background:"#ecfdf5",border:"1px solid #6ee7b7",borderRadius:10,color:"#059669"}}>
                          ⬆️ 입금
                        </button>
                        <button onClick={()=>setCmaTransfer({aid:acctTab,idx:i,type:"withdraw",amount:""})}
                          style={{flex:1,minHeight:40,fontSize:13,fontWeight:700,background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,color:"#2563eb"}}>
                          ⬇️ 출금
                        </button>
                      </div>
                    )}
                    {/* 인라인 입력창 */}
                    {cmaTransfer&&cmaTransfer.aid===acctTab&&cmaTransfer.idx===i&&(
                      <div style={{background:cmaTransfer.type==="deposit"?"#f0fdf4":"#eff6ff",border:`1px solid ${cmaTransfer.type==="deposit"?"#86efac":"#bfdbfe"}`,borderRadius:12,padding:"12px 14px"}}>
                        <div style={{fontSize:13,fontWeight:700,color:cmaTransfer.type==="deposit"?"#059669":"#2563eb",marginBottom:10}}>
                          {cmaTransfer.type==="deposit"?"⬆️ 입금 금액 입력":"⬇️ 출금 금액 입력"}
                          <span style={{fontSize:11,fontWeight:400,color:C.muted,marginLeft:8}}>현재 잔액 {won(parseFloat(h.principal)||0)}</span>
                        </div>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <input
                            type="text" inputMode="numeric"
                            value={cmaTransfer.amount}
                            onChange={e=>{
                              const raw=e.target.value.replace(/[^0-9]/g,"");
                              setCmaTransfer(prev=>({...prev,amount:raw?Number(raw).toLocaleString("ko-KR"):""}));
                            }}
                            onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();applyCmaTransfer();}}}
                            placeholder="금액 입력 (원)"
                            autoFocus
                            style={{flex:1,padding:"11px 12px",background:"#ffffff",border:`1.5px solid ${cmaTransfer.type==="deposit"?"#34d399":"#60a5fa"}`,borderRadius:9,fontSize:16,color:C.text,outline:"none",fontFamily:"'Noto Sans KR',sans-serif"}}
                          />
                          <button onClick={applyCmaTransfer}
                            style={{minWidth:56,minHeight:44,padding:"0 10px",background:cmaTransfer.type==="deposit"?"#059669":"#2563eb",border:"none",borderRadius:9,color:"#fff",fontSize:13,fontWeight:700}}>
                            확인
                          </button>
                          <button onClick={()=>setCmaTransfer(null)}
                            style={{minWidth:44,minHeight:44,padding:"0 8px",background:C.card2,border:`1px solid ${C.border}`,borderRadius:9,color:C.muted,fontSize:13,fontWeight:700}}>
                            취소
                          </button>
                        </div>
                        {/* 빠른 금액 버튼 */}
                        <div style={{display:"flex",gap:5,marginTop:8,flexWrap:"wrap"}}>
                          {[100,500,1000,3000,5000,10000].map(v=>(
                            <button key={v} onClick={()=>setCmaTransfer(prev=>({...prev,amount:Number(v*10000).toLocaleString("ko-KR")}))}
                              style={{padding:"5px 10px",background:"#ffffff",border:`1px solid ${cmaTransfer.type==="deposit"?"#86efac":"#bfdbfe"}`,borderRadius:7,fontSize:12,color:cmaTransfer.type==="deposit"?"#059669":"#2563eb",fontWeight:700}}>
                              +{v}만
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>openEdit(acctTab,i)} style={{flex:1,minHeight:46,fontSize:13,fontWeight:700,background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,color:C.accent}}>✏️ 수정</button>
                  <button onClick={()=>confirmDelete(acctTab,i,h.name)} style={{flex:1,minHeight:46,fontSize:13,fontWeight:700,background:"#fef2f2",border:`1px solid ${C.up}44`,borderRadius:10,color:C.up}}>🗑 삭제</button>
                </div>
              </div>);
            })}
            {/* 종목 순서 편집 + 추가 */}
            <div style={{display:"flex",gap:8,marginTop:4}}>
              {curData.list.length>1&&(
                <button onClick={()=>setEditingItemOrder(e=>!e)} style={{flex:1,minHeight:52,fontSize:14,fontWeight:700,background:editingItemOrder?C.accent+"22":C.card2,border:`1px solid ${editingItemOrder?C.accent:C.border}`,borderRadius:14,color:editingItemOrder?C.accent:C.muted}}>
                  {editingItemOrder?"✅ 순서 저장":"⇅ 순서변경"}
                </button>
              )}
              <button onClick={openAdd} style={{flex:2,minHeight:52,fontSize:15,fontWeight:700,background:`${curAcct.color}20`,border:`1px solid ${curAcct.color}60`,borderRadius:14,color:curAcct.color}}>
                ➕ {curAcct.label} 종목 추가
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 수익 그래프 */}
      {tab==="graph"&&(
        <GraphView
          allAccounts={allAccounts}
          myTotal={myTotal}
          myPnl={myPnl}
          myPct={myPct}
          history={history}
        />
      )}

      {/* AI */}
      {tab==="ai"&&(
        <div style={{padding:16}}>
          <div style={{background:C.card,borderRadius:16,padding:18,border:`1px solid ${C.border}`,marginBottom:16}}>
            <div style={{fontSize:14,color:C.sub,fontWeight:700,marginBottom:6}}>🤖 AI 포트폴리오 분석</div>
            <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>6개 계좌 전체 데이터를 기반으로 Claude AI에게 분석을 요청하세요.</div>
          </div>
          <ST t="빠른 질문"/>
          {["전체 포트폴리오 수익률 분석해줘","퇴직연금·IRP·ISA 절세 전략 알려줘","계좌별 자산 재배분 추천해줘","AMT 공동계좌 수익 분배 정리해줘","리스크 높은 자산 알려줘"].map((q,i)=>(
            <button key={i} onClick={()=>setAiQ(q)} style={{width:"100%",minHeight:48,padding:"0 16px",marginBottom:7,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,color:C.sub,fontSize:13,textAlign:"left"}}>💬 {q}</button>
          ))}
          <div style={{display:"flex",gap:8,marginTop:4,marginBottom:14}}>
            <input value={aiQ} onChange={e=>setAiQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();askAI();}}} placeholder="직접 질문을 입력하세요..."
              style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,padding:"13px 14px",fontSize:16,outline:"none"}}/>
            <button onClick={askAI} disabled={aiLoad} style={{minWidth:64,minHeight:50,padding:"0 14px",border:"none",borderRadius:10,background:aiLoad?"#162236":"linear-gradient(135deg,#3b82f6,#1d4ed8)",color:"#fff",fontSize:14,fontWeight:700}}>{aiLoad?"⏳":"전송"}</button>
          </div>
          {aiLoad&&<div style={{background:C.card,borderRadius:14,padding:24,border:`1px solid ${C.border}`,textAlign:"center",color:C.sub,fontSize:14}}>🤖 분석 중...</div>}
          {aiA&&!aiLoad&&(<div style={{background:C.card,borderRadius:14,padding:18,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:13,color:C.accent,marginBottom:10,fontWeight:700}}>🤖 Claude AI 분석 결과</div>
            <div style={{fontSize:14,color:C.text,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{aiA}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:12,paddingTop:10,borderTop:`1px solid ${C.border}`}}>⚠️ AI 분석은 참고용이며 투자 결정의 책임은 본인에게 있습니다.</div>
          </div>)}
        </div>
      )}

      {/* 하단 네비 + 스와이프 인디케이터 */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(12px)",borderTop:`1px solid ${C.border}`,zIndex:20,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <div style={{display:"flex"}}>
          {[["dash","📊","대시보드"],["accounts","💼","계좌별"],["graph","📈","그래프"],["ai","🤖","AI"]].map(([k,e,v])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,minHeight:54,padding:"7px 0 9px",fontSize:10,fontWeight:700,background:"none",border:"none",color:tab===k?C.accent:C.muted,borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:19}}>{e}</span>{v}
            </button>
          ))}
        </div>
        {/* ★ 스와이프 인디케이터 */}
        <div style={{display:"flex",justifyContent:"center",gap:5,paddingBottom:6}}>
          {TABS.map(t=><div key={t} style={{width:t===tab?20:6,height:3,borderRadius:3,background:t===tab?C.accent:C.muted,transition:"all .3s"}}/>)}
        </div>
      </div>

      {/* 모달들 */}
      <FormModal show={modal==="holding"} form={form} setForm={setForm} editIdx={editIdx} mAcct={mAcct} prices={prices} fxRate={fxRate} onSave={saveHolding} onClose={()=>setModal(null)} onFetchTicker={fetchSingleTicker}/>
      <SettingsModal show={modal==="settings"} fxRate={fxRate} fxAuto={fxAuto} fxTime={fxTime} fxSource={fxSource} setFxRate={setFxRate} onClose={()=>setModal(null)} showToast={showToast} onFetchFx={fetchFxRate}/>
      {modal==="confirm"&&confirmCb&&(<ConfirmModal msg="이 종목을 삭제할까요? 삭제 후 복구가 어렵습니다." onOk={confirmCb.fn} onCancel={()=>{setModal(null);setConfirmCb(null);}}/>)}
    </div>
  );
}

// ★ unlock() 호출 후 최초 1회 실행 (빈 화면 버그 완전 해결)
window.__mountApp = function() {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
